<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — VoaxSec</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ═══════════════════════════════
     LIGHT MODE (default)
  ═══════════════════════════════ */
  :root {
    --bg:          #f5f5f3;
    --bg2:         #ebebea;
    --bg3:         #e0e0de;
    --border:      rgba(0,0,0,0.08);
    --border-hover:rgba(0,0,0,0.18);
    --text:        #1a1a1a;
    --text-muted:  #666;
    --text-dim:    #999;
    --accent:      #007a42;
    --accent-dim:  rgba(0,122,66,0.08);
    --accent-mid:  rgba(0,122,66,0.15);
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  /* ═══════════════════════════════
     DARK MODE
  ═══════════════════════════════ */
  :root.dark {
    --bg:          #0a0a0a;
    --bg2:         #111111;
    --bg3:         #161616;
    --border:      rgba(255,255,255,0.07);
    --border-hover:rgba(255,255,255,0.15);
    --text:        #e8e8e8;
    --text-muted:  #666;
    --text-dim:    #444;
    --accent:      #00ff88;
    --accent-dim:  rgba(0,255,136,0.08);
    --accent-mid:  rgba(0,255,136,0.15);
  }

  /* Grid adapts to mode */
  :root.dark body::before {
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
  }

  /* ═══════════════════════════════
     THEME TOGGLE BUTTON
  ═══════════════════════════════ */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .theme-toggle:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  /* The pill / switch track */
  .toggle-track {
    width: 28px;
    height: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
    transition: background 0.25s;
    flex-shrink: 0;
  }

  :root.dark .toggle-track { background: var(--accent); border-color: var(--accent); }

  /* The moving circle */
  .toggle-thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 10px; height: 10px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: transform 0.25s, background 0.25s;
  }

  :root.dark .toggle-thumb { transform: translateX(12px); background: #0a0a0a; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .back {
    position: fixed;
    top: 24px;
    left: 32px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
    z-index: 10;
  }
  .back:hover { color: var(--accent); }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
  }

  .header-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header-title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  /* MODE TABS — Password vs Passphrase */
  .mode-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px;
  }

  .mode-tab {
    flex: 1;
    padding: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    cursor: pointer;
    border-radius: 2px;
    color: var(--text-muted);
    transition: all 0.2s;
    user-select: none;
    border: 1px solid transparent;
  }

  .mode-tab.active {
    color: var(--accent);
    background: var(--accent-dim);
    border-color: rgba(0,255,136,0.2);
  }

  /* OUTPUT */
  .output-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    min-height: 68px;
    transition: border-color 0.2s;
  }

  .output-box:hover { border-color: var(--border-hover); }

  .password-text {
    font-family: var(--mono);
    font-size: 17px;
    color: var(--accent);
    letter-spacing: 0.03em;
    word-break: break-all;
    flex: 1;
    line-height: 1.5;
  }

  .password-text.placeholder {
    color: var(--text-dim);
    font-size: 13px;
  }

  .copy-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  /* STRENGTH */
  .strength-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .strength-bars { display: flex; gap: 4px; flex: 1; }

  .strength-bar {
    flex: 1;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    transition: background 0.3s;
  }

  .strength-bar.weak   { background: var(--red); }
  .strength-bar.fair   { background: var(--yellow); }
  .strength-bar.strong { background: var(--green); }

  .strength-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    min-width: 64px;
    text-align: right;
    transition: color 0.3s;
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: flex; flex-direction: column; gap: 20px; }

  .option-row { display: flex; flex-direction: column; gap: 10px; }

  .option-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .option-label { font-size: 13px; color: var(--text-muted); }

  .option-value {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--accent);
    font-weight: 300;
  }

  input[type="range"] {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
    border: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .inner-divider { border: none; border-top: 1px solid var(--border); }

  /* CHECKBOXES */
  .checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .checkbox-item:hover { border-color: var(--border-hover); background: var(--bg3); }
  .checkbox-item.active { border-color: rgba(0,255,136,0.3); background: var(--accent-dim); }

  .checkbox-box {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s;
  }

  .checkbox-item.active .checkbox-box { background: var(--accent); border-color: var(--accent); }

  .checkbox-box::after {
    content: '✓';
    font-size: 10px;
    color: var(--bg);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .checkbox-item.active .checkbox-box::after { opacity: 1; }
  .checkbox-text { font-size: 13px; color: var(--text-muted); transition: color 0.2s; }
  .checkbox-item.active .checkbox-text { color: var(--text); }
  .checkbox-item input[type="checkbox"] { display: none; }

  /* SEPARATOR selector — para passphrase */
  .separator-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .separator-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Cada opción de separador */
  .sep-option {
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
    user-select: none;
  }

  .sep-option:hover { border-color: var(--border-hover); color: var(--text); }
  .sep-option.active { border-color: rgba(0,255,136,0.3); background: var(--accent-dim); color: var(--accent); }

  /* GENERATE BUTTON */
  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 8px;
  }

  .generate-btn:hover { opacity: 0.85; }
  .generate-btn:active { transform: scale(0.99); }

  .card-footer {
    margin-top: 24px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .card-footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
  .card-footer a:hover { color: var(--accent); }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; }
    .checkboxes { grid-template-columns: 1fr; }
    .password-text { font-size: 14px; }
  }
</style>
</head>
<body>

<a href="index.html" class="back">← voaxsec.com</a>

<div class="card">

  <p class="header-label">// Tool_01</p>
  <h1 class="header-title">Password Generator</h1>
  <p class="header-sub">Random password or memorable passphrase — your choice.</p>

  <!-- TABS: modo password vs passphrase -->
  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-password" onclick="switchMode('password')">
      Random Password
    </div>
    <div class="mode-tab" id="tab-passphrase" onclick="switchMode('passphrase')">
      Passphrase
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-box">
    <span class="password-text placeholder" id="password-display">Click generate...</span>
    <button class="copy-btn" id="copy-btn" onclick="copyPassword()">Copy</button>
  </div>

  <!-- STRENGTH BAR -->
  <div class="strength-row">
    <div class="strength-bars">
      <div class="strength-bar" id="bar1"></div>
      <div class="strength-bar" id="bar2"></div>
      <div class="strength-bar" id="bar3"></div>
      <div class="strength-bar" id="bar4"></div>
    </div>
    <span class="strength-label" id="strength-label">—</span>
  </div>

  <!-- ══════════════════════════════════ -->
  <!-- PANEL: RANDOM PASSWORD            -->
  <!-- ══════════════════════════════════ -->
  <div class="panel active" id="panel-password">

    <!-- Slider de longitud -->
    <div class="option-row">
      <div class="option-header">
        <span class="option-label">Length</span>
        <span class="option-value" id="length-display">16</span>
      </div>
      <input type="range" id="length-slider" min="6" max="64" value="16"
             oninput="document.getElementById('length-display').textContent = this.value">
    </div>

    <hr class="inner-divider">

    <!-- Checkboxes de tipos de caracteres -->
    <div class="checkboxes">
      <label class="checkbox-item active" id="lbl-upper">
        <input type="checkbox" id="opt-upper" checked>
        <div class="checkbox-box"></div>
        <span class="checkbox-text">Uppercase</span>
      </label>
      <label class="checkbox-item active" id="lbl-lower">
        <input type="checkbox" id="opt-lower" checked>
        <div class="checkbox-box"></div>
        <span class="checkbox-text">Lowercase</span>
      </label>
      <label class="checkbox-item active" id="lbl-numbers">
        <input type="checkbox" id="opt-numbers" checked>
        <div class="checkbox-box"></div>
        <span class="checkbox-text">Numbers</span>
      </label>
      <label class="checkbox-item" id="lbl-symbols">
        <input type="checkbox" id="opt-symbols">
        <div class="checkbox-box"></div>
        <span class="checkbox-text">Symbols</span>
      </label>
    </div>

  </div>

  <!-- ══════════════════════════════════ -->
  <!-- PANEL: PASSPHRASE                 -->
  <!-- ══════════════════════════════════ -->
  <div class="panel" id="panel-passphrase">

    <!-- Slider de número de palabras -->
    <div class="option-row">
      <div class="option-header">
        <span class="option-label">Number of words</span>
        <span class="option-value" id="words-display">4</span>
      </div>
      <input type="range" id="words-slider" min="3" max="8" value="4"
             oninput="document.getElementById('words-display').textContent = this.value">
    </div>

    <hr class="inner-divider">

    <!-- Separador -->
    <div class="separator-row">
      <span class="option-label">Separator</span>
      <div class="separator-options">
        <!-- Cada botón tiene data-sep con el separador real -->
        <div class="sep-option active" data-sep="-">— hyphen</div>
        <div class="sep-option" data-sep=".">. dot</div>
        <div class="sep-option" data-sep="_">_ underscore</div>
        <div class="sep-option" data-sep=" ">  space</div>
        <div class="sep-option" data-sep="#"># hash</div>
      </div>
    </div>

    <hr class="inner-divider">

    <!-- Opciones extra de passphrase -->
    <div class="checkboxes">
      <label class="checkbox-item" id="lbl-capitalize">
        <input type="checkbox" id="opt-capitalize">
        <div class="checkbox-box"></div>
        <span class="checkbox-text">Capitalize</span>
      </label>
      <label class="checkbox-item" id="lbl-addnumber">
        <input type="checkbox" id="opt-addnumber">
        <div class="checkbox-box"></div>
        <span class="checkbox-text">Add number</span>
      </label>
    </div>

  </div>

  <!-- BOTÓN GENERAR -->
  <button class="generate-btn" onclick="generate()">Generate</button>

  <p class="card-footer">
    Built by <a href="index.html">Xavier Olvera</a> · voaxsec.com
  </p>

</div>

<script>
  // ─────────────────────────────────────────────
  // ESTADO GLOBAL
  // ─────────────────────────────────────────────
  let currentMode     = 'password'; // 'password' o 'passphrase'
  let currentPassword = '';         // La contraseña/frase actual
  let currentSep      = '-';        // Separador activo en passphrase

  // ─────────────────────────────────────────────
  // ALFABETOS para modo password
  // ─────────────────────────────────────────────
  const CHARS = {
    upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:   'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  // ─────────────────────────────────────────────
  // WORDLIST — 200 palabras comunes en inglés
  // En una app real usarías la lista EFF (7776 palabras)
  // ─────────────────────────────────────────────
  const WORDS = [
    'apple','bridge','cloud','dance','eagle','flame','grape','house','ivory',
    'jungle','knife','lemon','magic','noble','ocean','piano','queen','river',
    'stone','tiger','ultra','vivid','water','xenon','yacht','zebra','amber',
    'brave','cyber','delta','ember','frost','globe','honey','icing','joker',
    'karma','lunar','maple','north','olive','plaza','quick','radar','solar',
    'tango','ultra','vapor','waltz','pixel','youth','alpha','blaze','coral',
    'drift','elite','flare','ghost','hatch','index','jewel','kiwi','latch',
    'mongo','nexus','orbit','pulse','quark','relay','sigma','torch','unity',
    'venom','whisk','axiom','basin','cedar','depot','flair','grain','hinge',
    'inlet','joust','knack','lance','manor','notch','onion','prism','quest',
    'raven','scout','taste','upper','viola','wrist','xenon','yodel','zonal',
    'arrow','bench','crisp','denim','epoch','fable','gloom','hedge','irony',
    'jazzy','kitty','lodge','mango','nerve','opera','peach','quirk','robin',
    'salsa','tempo','uncle','video','walnut','xerox','yearn','zippy','agent',
    'bloom','crimp','dodge','elbow','fetch','grasp','humid','inlet','jumpy',
    'kneel','lever','match','navel','ozone','pinch','rainy','stamp','table',
    'usher','valid','witty','exact','young','zones','adapt','blend','crush',
    'dusty','exile','foamy','grant','hazel','impel','jelly','kayak','lofty',
    'mkdir','night','oaken','paint','queen','roads','sweet','twist','urban'
  ];

  // ─────────────────────────────────────────────
  // SWITCH DE MODO (tabs)
  // ─────────────────────────────────────────────
  function switchMode(mode) {
    currentMode = mode;

    // Actualizar tabs
    document.getElementById('tab-password').classList.toggle('active', mode === 'password');
    document.getElementById('tab-passphrase').classList.toggle('active', mode === 'passphrase');

    // Mostrar el panel correcto
    document.getElementById('panel-password').classList.toggle('active', mode === 'password');
    document.getElementById('panel-passphrase').classList.toggle('active', mode === 'passphrase');

    // Generar automáticamente al cambiar modo
    generate();
  }

  // ─────────────────────────────────────────────
  // CHECKBOXES — toggle visual
  // ─────────────────────────────────────────────
  document.querySelectorAll('.checkbox-item').forEach(item => {
    item.addEventListener('click', () => {
      const cb = item.querySelector('input[type="checkbox"]');
      item.classList.toggle('active', cb.checked);
    });
  });

  // ─────────────────────────────────────────────
  // SEPARADORES — selector visual
  // ─────────────────────────────────────────────
  document.querySelectorAll('.sep-option').forEach(btn => {
    btn.addEventListener('click', () => {
      // Quitar active de todos
      document.querySelectorAll('.sep-option').forEach(b => b.classList.remove('active'));
      // Poner active en el clickeado
      btn.classList.add('active');
      // Guardar el separador seleccionado
      currentSep = btn.getAttribute('data-sep');
    });
  });

  // ─────────────────────────────────────────────
  // FUNCIÓN PRINCIPAL — decide qué generar
  // ─────────────────────────────────────────────
  function generate() {
    if (currentMode === 'password') {
      generatePassword();
    } else {
      generatePassphrase();
    }
  }

  // ─────────────────────────────────────────────
  // GENERAR CONTRASEÑA RANDOM
  // ─────────────────────────────────────────────
  function generatePassword() {
    const length     = parseInt(document.getElementById('length-slider').value);
    const useUpper   = document.getElementById('opt-upper').checked;
    const useLower   = document.getElementById('opt-lower').checked;
    const useNumbers = document.getElementById('opt-numbers').checked;
    const useSymbols = document.getElementById('opt-symbols').checked;

    if (!useUpper && !useLower && !useNumbers && !useSymbols) {
      alert('Select at least one character type.');
      return;
    }

    // Construir alfabeto
    let alphabet = '';
    if (useUpper)   alphabet += CHARS.upper;
    if (useLower)   alphabet += CHARS.lower;
    if (useNumbers) alphabet += CHARS.numbers;
    if (useSymbols) alphabet += CHARS.symbols;

    // Generar con crypto — seguro criptográficamente
    const array = new Uint32Array(length);
    crypto.getRandomValues(array);

    let password = '';
    for (let i = 0; i < length; i++) {
      password += alphabet[array[i] % alphabet.length];
    }

    showResult(password);
    updateStrengthPassword(length, useUpper, useLower, useNumbers, useSymbols);
  }

  // ─────────────────────────────────────────────
  // GENERAR PASSPHRASE
  // Ej: "river-stone-cloud-eagle"
  // ─────────────────────────────────────────────
  function generatePassphrase() {
    const count      = parseInt(document.getElementById('words-slider').value);
    const capitalize = document.getElementById('opt-capitalize').checked;
    const addNumber  = document.getElementById('opt-addnumber').checked;

    // Elegir palabras al azar de la wordlist
    const array = new Uint32Array(count);
    crypto.getRandomValues(array);

    let words = [];
    for (let i = 0; i < count; i++) {
      let word = WORDS[array[i] % WORDS.length];
      // Si capitalize está activo, primera letra en mayúscula
      if (capitalize) {
        word = word.charAt(0).toUpperCase() + word.slice(1);
      }
      words.push(word);
    }

    // Si addNumber está activo, añadimos un número al final
    if (addNumber) {
      const numArray = new Uint32Array(1);
      crypto.getRandomValues(numArray);
      const num = numArray[0] % 100; // Número entre 0 y 99
      words.push(String(num));
    }

    // Unir palabras con el separador elegido
    const passphrase = words.join(currentSep);

    showResult(passphrase);
    updateStrengthPassphrase(count, capitalize, addNumber);
  }

  // ─────────────────────────────────────────────
  // MOSTRAR RESULTADO
  // ─────────────────────────────────────────────
  function showResult(result) {
    currentPassword = result;

    const display = document.getElementById('password-display');
    display.textContent = result;
    display.classList.remove('placeholder');

    // Reset copy button
    const copyBtn = document.getElementById('copy-btn');
    copyBtn.textContent = 'Copy';
    copyBtn.classList.remove('copied');
  }

  // ─────────────────────────────────────────────
  // FORTALEZA — modo password
  // ─────────────────────────────────────────────
  function updateStrengthPassword(length, upper, lower, numbers, symbols) {
    const typesUsed = [upper, lower, numbers, symbols].filter(Boolean).length;

    let score = 0;
    if (length >= 8)  score++;
    if (length >= 12) score++;
    if (length >= 16) score++;
    if (typesUsed >= 2) score++;
    if (typesUsed >= 3) score++;
    if (typesUsed === 4) score++;

    applyStrength(score, 6);
  }

  // ─────────────────────────────────────────────
  // FORTALEZA — modo passphrase
  // Las passphrases son fuertes por naturaleza
  // entre más palabras, más fuerte
  // ─────────────────────────────────────────────
  function updateStrengthPassphrase(count, capitalize, addNumber) {
    let score = 0;
    if (count >= 3) score++;
    if (count >= 4) score++;
    if (count >= 5) score += 2;
    if (count >= 7) score++;
    if (capitalize) score++;
    if (addNumber)  score++;

    applyStrength(score, 7);
  }

  // ─────────────────────────────────────────────
  // APLICAR COLORES AL INDICADOR DE FORTALEZA
  // ─────────────────────────────────────────────
  function applyStrength(score, max) {
    let level, activeCount, barClass;

    const ratio = score / max;

    if (ratio <= 0.33) {
      level = 'Weak'; activeCount = 1; barClass = 'weak';
    } else if (ratio <= 0.6) {
      level = 'Fair'; activeCount = 2; barClass = 'fair';
    } else if (ratio <= 0.85) {
      level = 'Strong'; activeCount = 3; barClass = 'strong';
    } else {
      level = 'Very strong'; activeCount = 4; barClass = 'strong';
    }

    for (let i = 1; i <= 4; i++) {
      const bar = document.getElementById('bar' + i);
      bar.className = 'strength-bar';
      if (i <= activeCount) bar.classList.add(barClass);
    }

    const label = document.getElementById('strength-label');
    label.textContent = level;
    label.style.color = barClass === 'weak' ? 'var(--red)'
      : barClass === 'fair' ? 'var(--yellow)'
      : 'var(--green)';
  }

  // ─────────────────────────────────────────────
  // COPIAR AL PORTAPAPELES
  // ─────────────────────────────────────────────
  function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // Generar al cargar la página
  generate();

  // ─────────────────────────────────────────────
  // THEME TOGGLE — Light / Dark
  // Default: light. Persists via localStorage.
  // ─────────────────────────────────────────────
  (function() {
    // Check saved preference; default is light
    const saved = localStorage.getItem('voaxsec-theme');
    if (saved === 'dark') {
      document.documentElement.classList.add('dark');
    }
    updateToggleLabel();
  })();

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('voaxsec-theme', isDark ? 'dark' : 'light');
    updateToggleLabel();
  }

  function updateToggleLabel() {
    const isDark = document.documentElement.classList.contains('dark');
    const labels = document.querySelectorAll('.toggle-label');
    labels.forEach(l => l.textContent = isDark ? 'Dark' : 'Light');
  }

</script>

</body>
</html>
